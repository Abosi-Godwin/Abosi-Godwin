name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *'   
  workflow_dispatch:        

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    
    # 1. Grant the workflow permission to commit and push to your repo
    permissions:
      contents: write 

    steps:
      # 2. Check out the repository so the action can edit the README file
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update WakaTime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_LANGUAGE: "True"
          SHOW_SHORT_INFO: "False"
